<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">
    <title>Resultado | CodeQuest</title>
        <link rel="shortcut icon" href="img/icon.png" type="image/png">
    <link rel="stylesheet" href="resultado-quiz.css">
</head>

<body>

<main>

    <aside class="barra-lateral">

        <h1 class="logo">
            <span class="code">Code</span><span class="quest">Quest</span>
        </h1>

        <nav class="menu">
            <a href="#">🏠 Dashboard</a>
            <a href="#">📚 Lições</a>
            <a href="#">🧠 Quiz</a>
            <a href="#">🏆 Ranking</a>
        </nav>

    </aside>

    <section class="container">

        <div class="card">

            <div class="emoji">
                🎉
            </div>

            <h1>
                Quiz Concluído!
            </h1>

            <p class="frase2">
                Você mandou muito bem 🚀
            </p>

            <div class="ganho">

                <div class="ganho-caixa">
                    <h2>8/10</h2>
                    <p>Acertos</p>

                </div>

                <div class="ganho-caixa">

                    <h2>+240 XP</h2>
                    <p>XP Ganho</p>

                </div>

            </div>

            <div class="progresso">

                <div class="progresso-barra">

                    <div class="progresso-linha">

                    </div>

                </div>

                <span class="progresso-texto">
                    80% de aproveitamento
                </span>

            </div>

            <div class="botao">

                <button class="continuar">
                    Continuar
                </button>

                <button class="refazer">
                    Refazer Quiz
                </button>

            </div>

        </div>

    </section>

</main>

</body>
</html>
