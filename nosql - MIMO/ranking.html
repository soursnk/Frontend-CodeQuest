<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking | CodeQuest</title>
    <link rel="shortcut icon" href="img/icon.png" type="image/png">
    <link rel="stylesheet" href="ranking.css">
</head>
<body>
    <section class="container">

    <h1 class="frase1">Ranking Global</h1>

    <p class="frase2">
        Veja os jogadores com mais XP.
    </p>

    <section class="ranking-container">

    </section>

    <div class="ranking-ouro">

    <div class="lado1">
            <span class="posicao">🥇</span>
        <div>

            <h2>João</h2>
            <p>Nível 12</p>
        </div>
    </div>

    <span class="xp">
        2500 XP
    </span>
</div>

    <div class="ranking-prata">

    <div class="lado1">
            <span class="posicao">🥇</span>
        <div>

            <h2 class="nome">Maria</h2>
            <p class="nivel">Nível 10</p>
        </div>
    </div>

    <span class="xp">
        1500 XP
    </span>
</div>

    <div class="ranking-bronze">

    <div class="lado1">
            <span class="posicao">🥇</span>
        <div>

            <h2>Ana</h2>
            <p>Nível 8</p>
        </div>
    </div>

    <span class="xp">
        1000 XP
    </span>
</div>

</section>
</body>
</html>
